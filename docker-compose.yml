services:
  finanzas.api:
    image: ${DOCKER_REGISTRY-}finanzasapi
    build:
      context: .
      dockerfile: Finanzas.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - "5088:8080"
      - "7259:8081"
    depends_on:
      - db
      - otel-collector
    networks:
      - finanzas-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=+s0iGx:+}bFE9pwk?kCp
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - finanzas-network
      
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # Puerto OTLP gRPC
      - "4318:4318" # Puerto OTLP HTTP
      # - "8889:8889" # Puerto de métricas para Prometheus
    depends_on:
      - prometheus
      - loki
      - tempo
      - azurite-init
    networks:
      - finanzas-network

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: aspire-dashboard
    ports:
      - "18888:18888"
    environment:
      - DOTNET_DASHBOARD_UNSECURE_ALLOW_ANONYMOUS=true
      - ASPIRE_DASHBOARD_OTLP_ENDPOINT_URL=http://0.0.0.0:18889
    networks:
      - finanzas-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-otlp-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - finanzas-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - finanzas-network

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo-config.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo-config.yaml
    ports:
      - "3200:3200"
    networks:
      - finanzas-network
      
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - finanzas-network

  # ---- Cold storage (camino frío): emulador de Azure Blob Storage ----
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --debug /data/debug.log"
    ports:
      - "10000:10000" # Endpoint Blob Storage
    volumes:
      - azurite_data:/data
    networks:
      - finanzas-network

  # Crea los contenedores (otel-logs, otel-metrics, otel-traces) en Azurite
  # automáticamente al levantar el stack. Corre una sola vez y termina;
  # es idempotente (--public-access off ya existente no genera error).
  azurite-init:
    image: mcr.microsoft.com/azure-cli:latest
    container_name: azurite-init
    depends_on:
      - azurite
    environment:
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    entrypoint: >
      /bin/sh -c "
      until az storage container create --name otel-logs --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\" 2>/dev/null; do
        echo 'esperando a azurite...'; sleep 2;
      done;
      az storage container create --name otel-metrics --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\";
      az storage container create --name otel-traces --connection-string \"$$AZURE_STORAGE_CONNECTION_STRING\";
      echo 'contenedores otel-logs, otel-metrics y otel-traces listos en azurite';
      "
    networks:
      - finanzas-network

volumes:
  sql_data:
  grafana-storage:
  azurite_data:

networks:
  finanzas-network:
    driver: bridge
